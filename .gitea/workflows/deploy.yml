# Gitea Actions → VPS KingHost (Docker + Traefik)
# Site: https://gabrielhrp.com/
#
# Secrets obrigatórios (Repo → Settings → Actions → Secrets):
#   SSH_HOST
#   SSH_USER
#   SSH_PRIVATE_KEY
#   ADMIN_PASSWORD
#   MYSQL_ROOT_PASSWORD
#   DATABASE_PASSWORD
#
# Secrets opcionais:
#   SSH_PORT                 (default 22)
#   DEPLOY_PATH              (default /opt/portfolio)
#   DATABASE_NAME            (default portfolio)
#   DATABASE_USER            (default portfolio)
#   CONTACT_SMTP_HOST
#   CONTACT_SMTP_PORT        (default 587)
#   CONTACT_SMTP_USER
#   CONTACT_SMTP_PASS
#   CONTACT_SMTP_FROM
#   CONTACT_SMTP_TO
#   CONTACT_TO_EMAIL
#   CONTACT_SMTP_SECURE      (default false)
#
# O workflow gera /opt/portfolio/.env.production na VPS a partir desses secrets.
# Pré-requisitos na VPS: docs/DEPLOY.md

name: Deploy KingHost (Traefik)

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy gabrielhrp.com
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: |
          : "${SSH_HOST:?missing secret SSH_HOST}"
          : "${SSH_USER:?missing secret SSH_USER}"
          : "${SSH_PRIVATE_KEY:?missing secret SSH_PRIVATE_KEY}"
          : "${ADMIN_PASSWORD:?missing secret ADMIN_PASSWORD}"
          : "${MYSQL_ROOT_PASSWORD:?missing secret MYSQL_ROOT_PASSWORD}"
          : "${DATABASE_PASSWORD:?missing secret DATABASE_PASSWORD}"

      - name: Setup SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host kinghost
            HostName ${SSH_HOST}
            User ${SSH_USER}
            Port ${PORT}
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
          EOF
          chmod 600 ~/.ssh/config

      - name: Ensure remote directory
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          REMOTE_DIR="${DEPLOY_PATH:-/opt/portfolio}"
          ssh kinghost "mkdir -p '$REMOTE_DIR' '$REMOTE_DIR/public/uploads'"

      - name: Write .env.production from Gitea secrets
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CONTACT_SMTP_HOST: ${{ secrets.CONTACT_SMTP_HOST }}
          CONTACT_SMTP_PORT: ${{ secrets.CONTACT_SMTP_PORT }}
          CONTACT_SMTP_USER: ${{ secrets.CONTACT_SMTP_USER }}
          CONTACT_SMTP_PASS: ${{ secrets.CONTACT_SMTP_PASS }}
          CONTACT_SMTP_FROM: ${{ secrets.CONTACT_SMTP_FROM }}
          CONTACT_SMTP_TO: ${{ secrets.CONTACT_SMTP_TO }}
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
          CONTACT_SMTP_SECURE: ${{ secrets.CONTACT_SMTP_SECURE }}
        run: |
          set -euo pipefail
          REMOTE_DIR="${DEPLOY_PATH:-/opt/portfolio}"
          umask 077
          python3 - <<'PY'
          import os
          from pathlib import Path

          def val(key, default=""):
              v = os.environ.get(key)
              if v is None or v == "":
                  return default
              return v

          lines = [
              f"MYSQL_ROOT_PASSWORD={val('MYSQL_ROOT_PASSWORD')}",
              f"DATABASE_NAME={val('DATABASE_NAME', 'portfolio')}",
              f"DATABASE_USER={val('DATABASE_USER', 'portfolio')}",
              f"DATABASE_PASSWORD={val('DATABASE_PASSWORD')}",
              f"ADMIN_PASSWORD={val('ADMIN_PASSWORD')}",
              f"CONTACT_SMTP_HOST={val('CONTACT_SMTP_HOST')}",
              f"CONTACT_SMTP_PORT={val('CONTACT_SMTP_PORT', '587')}",
              f"CONTACT_SMTP_USER={val('CONTACT_SMTP_USER')}",
              f"CONTACT_SMTP_PASS={val('CONTACT_SMTP_PASS')}",
              f"CONTACT_SMTP_FROM={val('CONTACT_SMTP_FROM')}",
              f"CONTACT_SMTP_TO={val('CONTACT_SMTP_TO')}",
              f"CONTACT_TO_EMAIL={val('CONTACT_TO_EMAIL')}",
              f"CONTACT_SMTP_SECURE={val('CONTACT_SMTP_SECURE', 'false')}",
          ]
          Path("/tmp/portfolio.env.production").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          scp /tmp/portfolio.env.production "kinghost:${REMOTE_DIR}/.env.production"
          ssh kinghost "chmod 600 '${REMOTE_DIR}/.env.production'"
          rm -f /tmp/portfolio.env.production
          echo "Wrote ${REMOTE_DIR}/.env.production from Gitea secrets"

      - name: Rsync code to VPS
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          REMOTE_DIR="${DEPLOY_PATH:-/opt/portfolio}"
          rsync -az --delete \
            -e "ssh" \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude '.next/' \
            --exclude '.env' \
            --exclude '.env.local' \
            --exclude '.env.production' \
            --exclude 'public/uploads/*' \
            --exclude '.cursor/' \
            --include 'public/uploads/.gitkeep' \
            ./ "kinghost:${REMOTE_DIR}/"

      - name: Build and restart containers
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          REMOTE_DIR="${DEPLOY_PATH:-/opt/portfolio}"
          ssh kinghost "export DEPLOY_PATH='$REMOTE_DIR'; chmod +x '$REMOTE_DIR/scripts/deploy-remote.sh'; '$REMOTE_DIR/scripts/deploy-remote.sh'"

      - name: Health check https://gabrielhrp.com
        run: |
          set +e
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 https://gabrielhrp.com/ || echo 000)
            echo "Attempt $i → HTTP $code"
            case "$code" in
              200|301|302|307|308) echo "OK → https://gabrielhrp.com/"; exit 0 ;;
            esac
            sleep 5
          done
          echo "WARN: health check ainda sem resposta 2xx/3xx (DNS/TLS pode estar propagando)."
          exit 0
