# Gitea Actions → VPS KingHost (Docker + Traefik)
# Site: https://gabrielhrp.com/
#
# Secrets obrigatórios (Repo → Settings → Actions → Secrets):
#   SSH_HOST
#   SSH_USER
#   SSH_PASSWORD              — senha SSH da VPS (KingHost)
#   ADMIN_PASSWORD            — senha do /admin do site
#   MYSQL_ROOT_PASSWORD       — senha root do MySQL DO DOCKER (você escolhe)
#   DATABASE_PASSWORD         — senha do user MySQL DO DOCKER (você escolhe)
#
# Secrets opcionais:
#   SSH_PORT                 (default 22)
#   DEPLOY_PATH              (default /opt/portfolio)
#   DATABASE_NAME            (default portfolio)
#   DATABASE_USER            (default portfolio)
#   CONTACT_SMTP_HOST
#   CONTACT_SMTP_PORT        (default 587)
#   CONTACT_SMTP_USER
#   CONTACT_SMTP_PASS
#   CONTACT_SMTP_FROM
#   CONTACT_SMTP_TO
#   CONTACT_TO_EMAIL
#   CONTACT_SMTP_SECURE      (default false)
#
# MySQL sobe no docker-compose.prod.yml (serviço `mysql`).
# As senhas acima NÃO vêm de um MySQL externo: você as define nos Secrets
# e o compose cria o container com esses valores.
#
# O workflow gera /opt/portfolio/.env.production na VPS a partir desses secrets.

name: Deploy KingHost (Traefik)

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy gabrielhrp.com
    runs-on: ubuntu-latest
    steps:
      # Avoid actions/checkout when Gitea ROOT_URL is an internal host like
      # http://server:3000 (job containers cannot resolve "server").
      - name: Checkout
        env:
          # gitea.* (nativo) + github.* (compat act_runner)
          GITEA_TOKEN: ${{ gitea.token || github.token }}
          GITEA_SHA: ${{ gitea.sha || github.sha }}
          GITEA_REF: ${{ gitea.ref || github.ref }}
          # owner/repo from Actions context (avoids hardcoding)
          GITEA_REPOSITORY: ${{ gitea.repository || github.repository }}
        run: |
          set -euo pipefail
          PUBLIC_HOST="gitea.portfolio.vps-kinghost.net"
          REPO_PATH="${GITEA_REPOSITORY}.git"
          if [ -n "${GITEA_TOKEN:-}" ]; then
            CLONE_URL="https://oauth2:${GITEA_TOKEN}@${PUBLIC_HOST}/${REPO_PATH}"
          else
            CLONE_URL="https://${PUBLIC_HOST}/${REPO_PATH}"
          fi

          git init
          git remote add origin "$CLONE_URL"

          # Fetch the exact commit of this Actions run when possible.
          if [ -n "${GITEA_SHA:-}" ]; then
            git fetch --depth=1 origin "${GITEA_SHA}" \
              || git fetch --depth=1 origin "${GITEA_REF:-refs/heads/main}"
            git checkout --force FETCH_HEAD
          else
            git fetch --depth=1 origin "${GITEA_REF:-refs/heads/main}"
            git checkout --force FETCH_HEAD
          fi
          echo "Checked out $(git rev-parse --short HEAD) via public Gitea host"

      - name: Validate secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: |
          : "${SSH_HOST:?missing secret SSH_HOST}"
          : "${SSH_USER:?missing secret SSH_USER}"
          : "${SSH_PASSWORD:?missing secret SSH_PASSWORD}"
          : "${ADMIN_PASSWORD:?missing secret ADMIN_PASSWORD}"
          : "${MYSQL_ROOT_PASSWORD:?missing secret MYSQL_ROOT_PASSWORD}"
          : "${DATABASE_PASSWORD:?missing secret DATABASE_PASSWORD}"

      - name: Install sshpass
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass openssh-client rsync

      - name: Setup SSH (password auth)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

          # Wrappers so the rest of the workflow can call `ssh` / `scp` / `rsync`
          # with password auth without embedding the password in each step.
          cat > /tmp/ssh-password-env.sh <<'EOF'
          export SSHPASS="${SSH_PASSWORD}"
          export SSH_PORT_EFFECTIVE="${SSH_PORT:-22}"
          ssh_cmd() {
            sshpass -e ssh -p "${SSH_PORT_EFFECTIVE}" \
              -o StrictHostKeyChecking=accept-new \
              -o PreferredAuthentications=password \
              -o PubkeyAuthentication=no \
              -o NumberOfPasswordPrompts=1 \
              "$@"
          }
          scp_cmd() {
            sshpass -e scp -P "${SSH_PORT_EFFECTIVE}" \
              -o StrictHostKeyChecking=accept-new \
              -o PreferredAuthentications=password \
              -o PubkeyAuthentication=no \
              "$@"
          }
          rsync_ssh() {
            sshpass -e ssh -p "${SSH_PORT_EFFECTIVE}" \
              -o StrictHostKeyChecking=accept-new \
              -o PreferredAuthentications=password \
              -o PubkeyAuthentication=no
          }
          EOF

          # Persist for later steps via GITHUB_ENV + helper script
          echo "SSHPASS=${SSH_PASSWORD}" >> "$GITHUB_ENV"
          echo "SSH_PORT_EFFECTIVE=${PORT}" >> "$GITHUB_ENV"
          echo "SSH_TARGET=${SSH_USER}@${SSH_HOST}" >> "$GITHUB_ENV"

      - name: Ensure remote directory
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          REMOTE_DIR="${DEPLOY_PATH:-/opt/portfolio}"
          sshpass -e ssh -p "${SSH_PORT_EFFECTIVE:-22}" \
            -o StrictHostKeyChecking=accept-new \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            "${SSH_TARGET}" \
            "mkdir -p '$REMOTE_DIR' '$REMOTE_DIR/public/uploads'"

      - name: Write .env.production from Gitea secrets
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CONTACT_SMTP_HOST: ${{ secrets.CONTACT_SMTP_HOST }}
          CONTACT_SMTP_PORT: ${{ secrets.CONTACT_SMTP_PORT }}
          CONTACT_SMTP_USER: ${{ secrets.CONTACT_SMTP_USER }}
          CONTACT_SMTP_PASS: ${{ secrets.CONTACT_SMTP_PASS }}
          CONTACT_SMTP_FROM: ${{ secrets.CONTACT_SMTP_FROM }}
          CONTACT_SMTP_TO: ${{ secrets.CONTACT_SMTP_TO }}
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
          CONTACT_SMTP_SECURE: ${{ secrets.CONTACT_SMTP_SECURE }}
        run: |
          set -euo pipefail
          REMOTE_DIR="${DEPLOY_PATH:-/opt/portfolio}"
          umask 077
          python3 - <<'PY'
          import os
          from pathlib import Path

          def val(key, default=""):
              v = os.environ.get(key)
              if v is None or v == "":
                  return default
              return v

          lines = [
              f"MYSQL_ROOT_PASSWORD={val('MYSQL_ROOT_PASSWORD')}",
              f"DATABASE_NAME={val('DATABASE_NAME', 'portfolio')}",
              f"DATABASE_USER={val('DATABASE_USER', 'portfolio')}",
              f"DATABASE_PASSWORD={val('DATABASE_PASSWORD')}",
              f"ADMIN_PASSWORD={val('ADMIN_PASSWORD')}",
              f"CONTACT_SMTP_HOST={val('CONTACT_SMTP_HOST')}",
              f"CONTACT_SMTP_PORT={val('CONTACT_SMTP_PORT', '587')}",
              f"CONTACT_SMTP_USER={val('CONTACT_SMTP_USER')}",
              f"CONTACT_SMTP_PASS={val('CONTACT_SMTP_PASS')}",
              f"CONTACT_SMTP_FROM={val('CONTACT_SMTP_FROM')}",
              f"CONTACT_SMTP_TO={val('CONTACT_SMTP_TO')}",
              f"CONTACT_TO_EMAIL={val('CONTACT_TO_EMAIL')}",
              f"CONTACT_SMTP_SECURE={val('CONTACT_SMTP_SECURE', 'false')}",
          ]
          Path("/tmp/portfolio.env.production").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          sshpass -e scp -P "${SSH_PORT_EFFECTIVE:-22}" \
            -o StrictHostKeyChecking=accept-new \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            /tmp/portfolio.env.production \
            "${SSH_TARGET}:${REMOTE_DIR}/.env.production"
          sshpass -e ssh -p "${SSH_PORT_EFFECTIVE:-22}" \
            -o StrictHostKeyChecking=accept-new \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            "${SSH_TARGET}" \
            "chmod 600 '${REMOTE_DIR}/.env.production'"
          rm -f /tmp/portfolio.env.production
          echo "Wrote ${REMOTE_DIR}/.env.production from Gitea secrets"

      - name: Rsync code to VPS
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          REMOTE_DIR="${DEPLOY_PATH:-/opt/portfolio}"
          rsync -az --delete \
            -e "sshpass -e ssh -p ${SSH_PORT_EFFECTIVE:-22} -o StrictHostKeyChecking=accept-new -o PreferredAuthentications=password -o PubkeyAuthentication=no" \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude '.next/' \
            --exclude '.env' \
            --exclude '.env.local' \
            --exclude '.env.production' \
            --exclude 'public/uploads/*' \
            --exclude '.cursor/' \
            --include 'public/uploads/.gitkeep' \
            ./ "${SSH_TARGET}:${REMOTE_DIR}/"

      - name: Build and restart containers
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          REMOTE_DIR="${DEPLOY_PATH:-/opt/portfolio}"
          sshpass -e ssh -p "${SSH_PORT_EFFECTIVE:-22}" \
            -o StrictHostKeyChecking=accept-new \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            "${SSH_TARGET}" \
            "export DEPLOY_PATH='$REMOTE_DIR'; chmod +x '$REMOTE_DIR/scripts/deploy-remote.sh'; '$REMOTE_DIR/scripts/deploy-remote.sh'"

      - name: Health check https://gabrielhrp.com
        run: |
          set +e
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 https://gabrielhrp.com/ || echo 000)
            echo "Attempt $i → HTTP $code"
            case "$code" in
              200|301|302|307|308) echo "OK → https://gabrielhrp.com/"; exit 0 ;;
            esac
            sleep 5
          done
          echo "WARN: health check ainda sem resposta 2xx/3xx (DNS/TLS pode estar propagando)."
          exit 0
